<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MboaMed - Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #16a34a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 40px; height: 40px; color: white; }
    h1 {
      color: #166534;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #4b5563;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn {
      background: #16a34a;
      color: white;
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #15803d; }
    .emergency {
      margin-top: 32px;
      padding: 16px;
      background: #fef2f2;
      border-radius: 12px;
      border: 1px solid #fecaca;
    }
    .emergency p { color: #dc2626; margin-bottom: 8px; }
    .emergency a {
      color: #dc2626;
      font-weight: 600;
      font-size: 20px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>
      Vérifiez votre connexion internet et réessayez. 
      Certaines fonctionnalités de MboaMed nécessitent une connexion.
    </p>
    <button class="btn" onclick="location.reload()">Réessayer</button>
    
    <div class="emergency">
      <p>🚨 En cas d'urgence médicale :</p>
      <a href="tel:222">Appeler le 222</a>
    </div>
  </div>
</body>
</html>
